spring:
  datasource:
    url: jdbc:mysql://localhost:3306/myblog?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: replace-with-local-db-password
  data:
    redis:
      host: localhost
      port: 6379

minio:
  endpoint: http://localhost:9000
  publicEndpoint: http://localhost:9000
  accessKey: replace-with-local-minio-access-key
  secretKey: replace-with-local-minio-secret-key
  bucketName: myblog

gitee:
  clientId: replace-with-local-gitee-client-id
  clientSecret: replace-with-local-gitee-client-secret

github:
  clientId: replace-with-local-github-client-id
  clientSecret: replace-with-local-github-client-secret

callback:
  url: http://localhost:8080/oauth/callback/

frontend:
  url: http://localhost:6678/

jwt:
  secret: replace-with-at-least-32-characters
  expiration-millis: 86400000
